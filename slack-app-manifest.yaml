# Slack app manifest for the software-factory bot (Station 1).
#
# Create the app from this file: https://api.slack.com/apps → Create New App
# → "From a manifest" → pick your workspace → paste this YAML.
# (Updating an existing app: App settings → App Manifest → paste → Save,
# then REINSTALL the app so the new scopes take effect.)
# Full setup walkthrough: docs/guides/slack-setup.md
#
# Scope note: the factory posts recommendation cards and answers follow-up
# questions in each card's thread — so beyond chat:write it needs to HEAR
# mentions and thread replies (app_mentions:read, channels:history/read,
# users:read). Still read-and-reply only: no reactions, no DMs, no private
# channels. Widening scope is always deliberate, same as the GitHub App.
#
# Socket Mode is enabled so local development needs no public URL for Slack:
# after installing, create an App-Level Token (Basic Information → App-Level
# Tokens → Generate, scope connections:write) and set it as SLACK_APP_TOKEN.

_metadata:
  major_version: 1
  minor_version: 1

display_information:
  name: Software Factory
  description: Dependency triage recommendations, with thread Q&A (Station 1)
  background_color: "#1a1d21"

features:
  bot_user:
    display_name: factory
    always_online: true

oauth_config:
  scopes:
    bot:
      - chat:write
      - app_mentions:read
      - channels:history
      - channels:read
      - users:read

settings:
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
