# Slack app manifest for the software-factory bot (Station 1).
#
# Create the app from this file: https://api.slack.com/apps → Create New App
# → "From a manifest" → pick your workspace → paste this YAML.
# Full setup walkthrough: docs/guides/slack-setup.md
#
# Scope note: Station 1 posts recommendation cards and does nothing else, so
# the only scope requested is chat:write — the same least-privilege posture
# as the read-only GitHub App. No events, no interactivity, no socket mode.
# Later stations that answer thread replies will widen this deliberately,
# on camera.

_metadata:
  major_version: 1
  minor_version: 1

display_information:
  name: Software Factory
  description: Read-only dependency triage recommendations (Station 1)
  background_color: "#1a1d21"

features:
  bot_user:
    display_name: factory
    always_online: true

oauth_config:
  scopes:
    bot:
      - chat:write

settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
